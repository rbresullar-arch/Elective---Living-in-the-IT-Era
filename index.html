<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT and ICT Activities</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #ffffff;
    color: #000000;
    font-family: Georgia, 'Times New Roman', serif;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 16px 80px;
    line-height: 1.5;
  }
  h1 {
    font-size: 22px;
    text-align: center;
    margin-bottom: 24px;
  }
  .section { display: none; }
  .section.active { display: block; }

  #nameForm {
    text-align: center;
  }
  #nameForm label {
    display: block;
    font-size: 15px;
    margin-bottom: 10px;
  }
  #nameInput {
    font-family: Georgia, serif;
    font-size: 15px;
    padding: 8px 10px;
    border: 1.5px solid #000;
    width: 260px;
    max-width: 80%;
  }
  button {
    font-family: Georgia, serif;
    font-size: 16px;
    padding: 10px 26px;
    background: #000;
    color: #fff;
    border: none;
    cursor: pointer;
  }
  button:active { background: #333; }

  #greeting {
    text-align: center;
    font-size: 15px;
    margin-bottom: 30px;
  }

  .activity-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    border: 1.5px solid #000;
    padding: 16px;
    margin-bottom: 14px;
  }
  .activity-row a.activity-btn {
    font-family: Georgia, serif;
    font-size: 16px;
    padding: 10px 26px;
    background: #000;
    color: #fff;
    text-decoration: none;
    display: inline-block;
  }
  .status {
    font-size: 14px;
    min-width: 140px;
    text-align: left;
  }
  .status.done { color: #000; }
  .status.pending { color: #777; }
  #blockOverlay {
    display: none;
    text-align: center;
    padding: 60px 20px;
    font-size: 16px;
  }
  #blockOverlay strong {
    display: block;
    font-size: 19px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<h1>IT and ICT Activities</h1>

<div id="blockOverlay">
  <strong>This activity requires Google Chrome on Android.</strong>
  Please open this page in Google Chrome and try again.
</div>

<!-- NAME CAPTURE -->
<div class="section active" id="section-name">
  <form id="nameForm">
    <label for="nameInput">Enter your full name to begin:</label>
    <input type="text" id="nameInput" required>
    <div style="margin-top:16px;">
      <button type="submit">Continue</button>
    </div>
  </form>
</div>

<!-- ACTIVITY LIST -->
<div class="section" id="section-activities">
  <div id="greeting"></div>

  <div class="activity-row">
    <a class="activity-btn" href="it_ict_sentence_order_v2.html">Activity 1</a>
    <span class="status" id="activity1Status">Checking...</span>
  </div>

  <div class="activity-row">
    <a class="activity-btn" href="abacus_addition_activity.html">Activity 2</a>
    <span class="status" id="activity2Status">Checking...</span>
  </div>
</div>

<script>
const NAME_KEY = 'itict_student_name';
const DATE_KEY = 'itict_created_date';

const RESULT_KEY = 'itict_essay_result';
const RESULT_COOKIE = 'itict_essay_result';
const IDB_NAME = 'itict_db';
const IDB_STORE = 'results';
const IDB_KEY = 'result';

const RESULT2_KEY = 'itict_abacus_result';
const RESULT2_COOKIE = 'itict_abacus_result';
const IDB_KEY2 = 'abacus_result';

function getCookie(name) {
  const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch (e) { return null; }
}

async function loadActivity1Result() {
  let record = null;
  const lsRaw = localStorage.getItem(RESULT_KEY);
  if (lsRaw) { try { record = JSON.parse(lsRaw); } catch (e) {} }
  if (!record) {
    const cookieRaw = getCookie(RESULT_COOKIE);
    if (cookieRaw) { try { record = JSON.parse(cookieRaw); } catch (e) {} }
  }
  if (!record) {
    record = await idbGet(IDB_KEY);
  }
  return record;
}

async function loadActivity2Result() {
  let record = null;
  const lsRaw = localStorage.getItem(RESULT2_KEY);
  if (lsRaw) { try { record = JSON.parse(lsRaw); } catch (e) {} }
  if (!record) {
    const cookieRaw = getCookie(RESULT2_COOKIE);
    if (cookieRaw) { try { record = JSON.parse(cookieRaw); } catch (e) {} }
  }
  if (!record) {
    record = await idbGet(IDB_KEY2);
  }
  return record;
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function refreshActivity1Status() {
  const statusEl = document.getElementById('activity1Status');
  const record = await loadActivity1Result();
  if (record) {
    const pct = Math.round((record.totalScore / record.totalMax) * 100);
    statusEl.textContent = `Score: ${record.totalScore}/${record.totalMax} (${pct}%)`;
    statusEl.className = 'status done';
  } else {
    statusEl.textContent = 'Not yet attempted';
    statusEl.className = 'status pending';
  }
}

async function refreshActivity2Status() {
  const statusEl = document.getElementById('activity2Status');
  const record = await loadActivity2Result();
  if (record) {
    statusEl.textContent = `Score: ${record.correctRounds}/${record.totalRounds} rounds`;
    statusEl.className = 'status done';
  } else {
    statusEl.textContent = 'Not yet attempted';
    statusEl.className = 'status pending';
  }
}

function enterActivities(name) {
  document.getElementById('greeting').textContent = `Hello, ${name}!`;
  showSection('section-activities');
  refreshActivity1Status();
  refreshActivity2Status();
}

document.getElementById('nameForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  localStorage.setItem(NAME_KEY, name);
  if (!localStorage.getItem(DATE_KEY)) {
    localStorage.setItem(DATE_KEY, new Date().toISOString());
  }
  enterActivities(name);
});

function isAndroid() {
  return /Android/i.test(navigator.userAgent);
}
function isChrome() {
  const ua = navigator.userAgent;
  return /Chrome\//.test(ua) && !/(SamsungBrowser|OPR\/|Edg\/|EdgA\/|Firefox|FxiOS|UCBrowser|MiuiBrowser|HeyTapBrowser|VivoBrowser)/i.test(ua);
}
const browserBlocked = isAndroid() && !isChrome();

/* On load: if name already saved, skip the name form */
(function init() {
  if (browserBlocked) {
    document.getElementById('blockOverlay').style.display = 'block';
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    return;
  }
  const savedName = localStorage.getItem(NAME_KEY);
  if (savedName) {
    enterActivities(savedName);
  }
})();
</script>

</body>
</html>
